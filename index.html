<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brangkas Catatan</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: var(--card);
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h2 { text-align: center; color: var(--primary); }
        input, textarea, button {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
        }
        textarea { resize: vertical; min-height: 100px; }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background-color: #1d4ed8; }
        .btn-danger { background-color: #ef4444; margin-top: 10px;}
        .btn-danger:hover { background-color: #b91c1c; }
        .hidden { display: none !important; }
        
        /* Note List Styles */
        .note-card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            position: relative;
        }
        .note-date { font-size: 12px; color: #6b7280; margin-bottom: 5px; }
        .note-text { white-space: pre-wrap; font-size: 14px;}
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            width: auto;
        }
    </style>
</head>
<body>

    <div id="auth-screen" class="container">
        <h2 id="auth-title">Setup Brangkas</h2>
        <p id="auth-desc" style="text-align: center; font-size: 14px;">Buat password baru untuk brangkas Anda.</p>
        <input type="password" id="password-input" placeholder="Masukkan Password...">
        <button onclick="handleAuth()">Masuk</button>
    </div>

    <div id="vault-screen" class="container hidden">
        <h2>Brangkas Terbuka 🔓</h2>
        <textarea id="note-input" placeholder="Ketik catatan rahasia di sini..."></textarea>
        <button onclick="saveNote()">Simpan Catatan</button>
        
        <div style="margin-top: 20px;">
            <h3>Catatan Tersimpan</h3>
            <div id="notes-list"></div>
        </div>

        <button class="btn-danger" onclick="lockVault()">Kunci Brangkas 🔒</button>
    </div>

    <script>
        // Inisialisasi Elemen
        const authScreen = document.getElementById('auth-screen');
        const vaultScreen = document.getElementById('vault-screen');
        const passInput = document.getElementById('password-input');
        const authTitle = document.getElementById('auth-title');
        const authDesc = document.getElementById('auth-desc');
        const noteInput = document.getElementById('note-input');
        const notesList = document.getElementById('notes-list');

        let savedPassword = localStorage.getItem('vault_password');

        // Cek status password saat dimuat
        function checkInit() {
            if (savedPassword) {
                authTitle.innerText = "Buka Brangkas";
                authDesc.innerText = "Masukkan password untuk membuka catatan.";
            } else {
                authTitle.innerText = "Setup Brangkas";
                authDesc.innerText = "Buat password baru untuk mengamankan catatan.";
            }
        }

        // Handle tombol Masuk
        function handleAuth() {
            const inputVal = passInput.value;
            if (!inputVal) return alert("Password tidak boleh kosong!");

            if (!savedPassword) {
                // Setup password baru
                localStorage.setItem('vault_password', inputVal);
                savedPassword = inputVal;
                alert("Password berhasil dibuat!");
                unlockVault();
            } else {
                // Verifikasi password
                if (inputVal === savedPassword) {
                    unlockVault();
                } else {
                    alert("Password Salah!");
                }
            }
        }

        // Buka brangkas
        function unlockVault() {
            authScreen.classList.add('hidden');
            vaultScreen.classList.remove('hidden');
            passInput.value = ''; // bersihkan input
            renderNotes();
        }

        // Kunci brangkas
        function lockVault() {
            vaultScreen.classList.add('hidden');
            authScreen.classList.remove('hidden');
            notesList.innerHTML = ''; // bersihkan tampilan catatan agar aman
            checkInit();
        }

        // Simpan catatan
        function saveNote() {
            const text = noteInput.value.trim();
            if (!text) return;

            const notes = getNotes();
            const newNote = {
                id: Date.now(),
                text: text,
                date: new Date().toLocaleString('id-ID')
            };

            notes.unshift(newNote); // Tambah di awal
            localStorage.setItem('vault_notes', JSON.stringify(notes));
            
            noteInput.value = '';
            renderNotes();
        }

        // Ambil catatan dari storage
        function getNotes() {
            const notes = localStorage.getItem('vault_notes');
            return notes ? JSON.parse(notes) : [];
        }

        // Hapus catatan
        function deleteNote(id) {
            if(confirm("Yakin ingin menghapus catatan ini?")) {
                let notes = getNotes();
                notes = notes.filter(note => note.id !== id);
                localStorage.setItem('vault_notes', JSON.stringify(notes));
                renderNotes();
            }
        }

        // Tampilkan catatan
        function renderNotes() {
            const notes = getNotes();
            notesList.innerHTML = '';

            if (notes.length === 0) {
                notesList.innerHTML = '<p style="text-align:center; color:#9ca3af; margin-top:10px;">Belum ada catatan.</p>';
                return;
            }

            notes.forEach(note => {
                const noteDiv = document.createElement('div');
                noteDiv.className = 'note-card';
                noteDiv.innerHTML = `
                    <button class="delete-btn" onclick="deleteNote(${note.id})">Hapus</button>
                    <div class="note-date">${note.date}</div>
                    <div class="note-text">${note.text}</div>
                `;
                notesList.appendChild(noteDiv);
            });
        }

        // Jalankan saat pertama kali buka
        checkInit();
    </script>
</body>
</html>
