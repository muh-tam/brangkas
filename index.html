<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brangkas Online</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { background: var(--card); width: 100%; max-width: 400px; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: var(--primary); }
        input, textarea, button { width: 100%; padding: 12px; border: 1px solid #334155; border-radius: 8px; font-size: 16px; background: #334155; color: white; }
        textarea { resize: vertical; min-height: 100px; }
        button { background-color: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-danger { background-color: #ef4444; margin-top: 10px; }
        .note-card { background: #0f172a; border: 1px solid #334155; padding: 15px; border-radius: 8px; margin-top: 10px; position: relative; }
        .note-date { font-size: 11px; color: #94a3b8; margin-bottom: 5px; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; border: none; border-radius: 4px; padding: 2px 6px; font-size: 10px; width: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen" class="container">
        <h2>Brangkas Online 🔒</h2>
        <p style="text-align: center; font-size: 14px;">Masukkan Password untuk Sinkronisasi</p>
        <input type="password" id="password-input" placeholder="Password Brangkas...">
        <button onclick="handleAuth()">Buka & Sinkron</button>
    </div>

    <div id="vault-screen" class="container hidden">
        <h2>Isi Brangkas 🔓</h2>
        <textarea id="note-input" placeholder="Tulis catatan rahasia baru..."></textarea>
        <button onclick="saveNote()">Simpan ke Cloud</button>
        <div id="notes-list"></div>
        <button class="btn-danger" onclick="location.reload()">Kunci & Keluar</button>
    </div>

    <script>
        // --- CONFIG FIREBASE ANDA ---
           const firebaseConfig = {
  apiKey: "AIzaSyC3M6Me_pBwykr3Y-EAEnJGQlOE3U7fMCo",
  authDomain: "markichat.firebaseapp.com",
  projectId: "markichat",
  databaseURL: "https://markichat-default-rtdb.asia-southeast1.firebasedatabase.app",
  storageBucket: "markichat.firebasestorage.app",
  messagingSenderId: "447816707968",
  appId: "1:447816707968:web:1ec43ae950702e946e5b65",
  measurementId: "G-FZBDG67QLV"
};

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentPass = "";

        function handleAuth() {
            const pass = document.getElementById('password-input').value;
            if (!pass) return alert("Password wajib diisi!");
            currentPass = btoa(pass); // Encoding sederhana agar password tidak jadi nama folder langsung
            unlockVault();
        }

        function unlockVault() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('vault-screen').classList.remove('hidden');
            loadNotes();
        }

        function saveNote() {
            const text = document.getElementById('note-input').value.trim();
            if (!text) return;

            // Simpan ke Firebase berdasarkan folder password
            db.ref('brangkas/' + currentPass).push({
                text: text,
                date: new Date().toLocaleString('id-ID')
            });

            document.getElementById('note-input').value = '';
        }

        function loadNotes() {
            db.ref('brangkas/' + currentPass).on('value', (snapshot) => {
                const list = document.getElementById('notes-list');
                list.innerHTML = "";
                const data = snapshot.val();
                for (let id in data) {
                    const n = data[id];
                    list.innerHTML += `
                        <div class="note-card">
                            <button class="delete-btn" onclick="deleteNote('${id}')">Hapus</button>
                            <div class="note-date">${n.date}</div>
                            <div>${n.text}</div>
                        </div>`;
                }
            });
        }

        function deleteNote(id) {
            if(confirm("Hapus catatan ini dari cloud?")) {
                db.ref('brangkas/' + currentPass + '/' + id).remove();
            }
        }
    </script>
</body>
</html>
